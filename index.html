<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPortal Secure</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h1>Acceso Seguro</h1>
            <p>Introduce la contraseña para ver el mapa</p>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button id="login-btn">Entrar al Mapa</button>
            <div id="error-message">Contraseña incorrecta. Inténtalo de nuevo.</div>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="legend-panel" class="hidden">
            <div class="panel-header">🗺️ Leyenda y Estadísticas</div>
            <div id="legend-content"></div>
            <hr class="stats-sep hidden">
            <div id="stats-1-section" class="hidden">
                <div class="stats-header" id="stats-title-1">Estadísticas 1</div>
                <div id="stats-content-1"></div>
            </div>
            <hr class="stats-sep hidden">
            <div id="stats-2-section" class="hidden">
                <div class="stats-header" id="stats-title-2">Estadísticas 2</div>
                <div id="stats-content-2"></div>
            </div>
        </div>
        <div id="attribute-table-container" class="collapsed">
            <div class="table-header">
                <span id="table-title">Tabla de Atributos</span>
                <button id="close-table">×</button>
            </div>
            <div class="table-wrapper">
                <table id="attribute-table">
                    <thead><tr id="table-head"></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
